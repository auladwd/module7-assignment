global:
  scrape_interval:     15s   # How often to scrape targets
  evaluation_interval: 15s   # How often to evaluate rules
  scrape_timeout:      10s

  external_labels:
    monitor: 'module7-monitor'
    environment: 'production'

# ─── Alerting ──────────────────────────────────────────────────────────────────
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# ─── Alert Rules ───────────────────────────────────────────────────────────────
rule_files:
  - "alert.rules.yml"

# ─── Scrape Configs ────────────────────────────────────────────────────────────
scrape_configs:

  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node Exporter - System Metrics (CPU, RAM, Disk, Network)
  - job_name: 'node_exporter'
    static_configs:
      - targets: ['node_exporter:9100']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'ec2-instance'

  # Backend Application Metrics
  - job_name: 'backend_app'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['app:3000']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'backend-app'

  # PostgreSQL (via app health endpoint)
  - job_name: 'postgres_health'
    metrics_path: '/health'
    static_configs:
      - targets: ['app:3000']
